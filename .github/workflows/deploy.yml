name: Deploy MkDocs no GithubPages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6          # ✅ Node 24 nativo

      - name: Configurar Python
        uses: actions/setup-python@v6      # ✅ Node 24 nativo
        with:
          python-version: 3.x

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Deploy
        run: mkdocs gh-deploy --force