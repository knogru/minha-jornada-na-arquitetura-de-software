name: Deploy MkDocs no GithubPages

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ força Node.js 24

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2        # ✅ versão com suporte ao Node 24

      - name: Configurar Python
        uses: actions/setup-python@v5.6.0    # ✅ versão com suporte ao Node 24
        with:
          python-version: 3.x

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Deploy
        run: mkdocs gh-deploy --force