site_name: Minha Jornada em Arquitetura de Software
site_url: https://knogru.github.io/minha-jornada-na-arquitetura-de-software/
site_description: Fichamentos e projetos da minha jornada em arquitetura de software
site_author: Aline Oliveira

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - navigation.top

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: "dd 'de' MMMM 'de' yyyy"
      post_url_format: "modulo/{categories}/{slug}"
      categories_allowed:
        - Módulo 1 · Fundamentos
        - Módulo 2 · Estilos Clássicos
        - Módulo 3 · Padrões Modernos
        - Módulo 4 · Documentação
        - Módulo 5 · Dados e Concorrência
        - Módulo 6 · Sistemas Distribuídos
        - Módulo 7 · Avaliação e Evolução
        - Módulo 8 · Refatoração Legada
  - tags

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - Início: index.md
  - Ementa: ementa.md